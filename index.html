                koreanDecision: "볼이 심판진에게 닿고 어느 한 팀이 유망한 공격을 시작하면 볼은 아웃 오브 플레이다. 이 경우 주심은 플레이를 중단시킨 시점의 위치에서 팀 A의 선수 한 명에게 드롭볼을 실시하여 재개한다. 당시 팀 A가 소유권을 가지고 있었기 때문이다.",

            }
        ];

        const container = document.getElementById('rules-container');

        rulesData.forEach((rule, index) => {
            const ruleElement = document.createElement('div');
            ruleElement.className = 'border-2 border-slate-700 rounded-lg bg-slate-800/50 backdrop-blur-sm card-glow transition-all duration-300 hover:border-cyan-400';
            
            ruleElement.innerHTML = `
                <button class="accordion-toggle w-full text-left p-4 md:p-6 flex justify-between items-center cursor-pointer">
                    <h2 class="text-lg md:text-xl font-semibold text-cyan-300">
                        <span class="mr-2">${index + 1}.</span> ${rule.title}
                    </h2>
                    <span class="toggle-icon text-cyan-400 text-2xl transform transition-transform duration-300">▶</span>
                </button>
                <div class="accordion-content">
                    <div class="p-4 md:p-6 border-t border-slate-700">
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <h3 class="text-xl font-bold text-fuchsia-400 mb-3">❓ 상황 (Korean)</h3>
                                <p class="text-gray-300 whitespace-pre-line">${rule.koreanSituation}</p>
                                <h3 class="text-xl font-bold text-fuchsia-400 mt-4 mb-3">✅ 올바른 판정</h3>
                                <p class="text-gray-300 whitespace-pre-line">${rule.koreanDecision}</p>
                            </div>
                            <div class="border-t md:border-t-0 md:border-l border-slate-600 pl-0 md:pl-6 pt-6 md:pt-0">
                                <h3 class="text-xl font-bold text-gray-400 mb-3">Situation (English)</h3>
                                <p class="text-gray-400 italic whitespace-pre-line">${rule.englishSituation}</p>
                                <h3 class="text-xl font-bold text-gray-400 mt-4 mb-3">Correct Decision</h3>
                                <p class="text-gray-400 italic whitespace-pre-line">${rule.englishDecision}</p>
                            </div>
                        </div>
                        <div class="mt-6 p-4 rounded-lg bg-cyan-900/30 border border-cyan-700">
                            <h4 class="text-lg font-bold text-cyan-200 mb-2">🔑 핵심포인트</h4>
                            <p class="text-cyan-200 whitespace-pre-line">${rule.keyPoint}</p>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(ruleElement);
        });

        const toggles = document.querySelectorAll('.accordion-toggle');
        toggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const content = toggle.nextElementSibling;
                const icon = toggle.querySelector('.toggle-icon');

                // Close all other accordions
                toggles.forEach(otherToggle => {
                    if (otherToggle !== toggle) {
                        otherToggle.nextElementSibling.classList.remove('open');
                        otherToggle.querySelector('.toggle-icon').classList.remove('rotate-90');
                    }
                });

                // Toggle the clicked accordion
                content.classList.toggle('open');
                icon.classList.toggle('rotate-90');
            });
        });
    </script>
</body>
</html>
